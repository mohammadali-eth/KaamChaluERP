<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Dashboard - KaamChaluERP</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body style="background:#000; color:#fff; font-family:Arial, sans-serif; min-height:100vh;">

<div class="container" style="max-width:900px; margin:auto; padding:50px 20px; text-align:center;">

<h1 style="margin-bottom:10px;">Dashboard</h1>

<hr style="border:none; border-top:1px solid #333; margin-bottom:40px;">

<div class="card" 
style="
display:flex;
justify-content:center;
align-items:center;
gap:40px;
padding:30px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.15);
border-radius:10px;
">

<div>

<h3 style="margin-bottom:15px;">Staff Management</h3>

<a href="staff"
style="
display:inline-block;
padding:10px 20px;
background:#fff;
color:#000;
text-decoration:none;
border-radius:5px;
font-weight:600;
">
Manage Staff </a>

</div>

<div>

<h3 style="margin-bottom:15px;">Inventory Management</h3>

<a href="inventory"
style="
display:inline-block;
padding:10px 20px;
background:#fff;
color:#000;
text-decoration:none;
border-radius:5px;
font-weight:600;
">
Manage Inventory </a>

</div>

</div>

</div>

</body>
</html>
