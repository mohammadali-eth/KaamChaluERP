<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KaamChaluERP - Reports</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Courier New", monospace;
}

body{
display:flex;
height:100vh;
background:#ffffff;
}

/* SIDEBAR */

.sidebar {
    width: 220px;
    border-right: 1px solid #000;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.logo {
    font-size: 18px;
    font-weight: bold;
    text-transform: uppercase;
    margin-bottom: 40px;
}

.menu a {
    display: block;
    text-decoration: none;
    color: #000;
    margin-bottom: 20px;
    font-size: 14px;
    text-transform: uppercase;
    padding: 8px;
    border: 1px solid transparent;
}

.menu a:hover {
    border: 1px solid #000;
}

.menu a.active{
border:1px solid #000;
background:#f5f5f5;
}

.logout {
    text-decoration: none;
    text-align: center;
    padding: 10px;
    border: 1px solid #000;
    text-transform: uppercase;
    font-size: 13px;
    color: #000;
}

.logout:hover {
    background: #000;
    color: #fff;
}

/* MAIN CONTENT */

.main{
flex:1;
padding:50px;
}

.header{
font-size:28px;
margin-bottom:30px;
letter-spacing:3px;
}

/* REPORT CARDS */

.reports{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
border:1px solid #000;
padding:25px;
background:#fff;
box-shadow:8px 8px 0px #000;
}

.card h3{
margin-bottom:10px;
font-size:16px;
}

.card p{
font-size:22px;
font-weight:bold;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th, td{
border-bottom:1px solid #000;
padding:14px;
text-align:left;
}

th{
font-size:14px;
letter-spacing:1px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div>

<div class="logo">KAAMCHALUERP</div>

<div class="menu">
<a href="deshboard.html">DASHBOARD</a>
<a href="employees.html">EMPLOYEES</a>
<a href="inventory.html">INVENTORY</a>
<a href="reports.html" class="active">REPORTS</a>
</div>

</div>

<a href="logout" class="logout">LOGOUT</a>

</div>


<!-- MAIN CONTENT -->

<div class="main">

<div class="header">REPORTS</div>

<div class="reports">

<div class="card">
<h3>Total Employees</h3>
<p>10</p>
</div>

<div class="card">
<h3>Total Inventory Items</h3>
<p>25</p>
</div>

<div class="card">
<h3>Total Inventory Value</h3>
<p>$13000</p>
</div>

</div>

<table>

<tr>
<th>REPORT NAME</th>
<th>DATE</th>
<th>STATUS</th>
</tr>

<tr>
<td>Employee Report</td>
<td>2026-03-06</td>
<td>Generated</td>
</tr>

<tr>
<td>Inventory Report</td>
<td>2026-03-06</td>
<td>Generated</td>
</tr>

</table>

</div>

</body>
</html>
