<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KaamChaluERP - Inventory</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Courier New", monospace;
}

body{
display:flex;
height:100vh;
background:#ffffff;
}

/* SIDEBAR */

.sidebar {
    width: 220px;
    border-right: 1px solid #000;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.logo {
    font-size: 18px;
    font-weight: bold;
    text-transform: uppercase;
    margin-bottom: 40px;
}

.menu a {
    display: block;
    text-decoration: none;
    color: #000;
    margin-bottom: 20px;
    font-size: 14px;
    text-transform: uppercase;
    padding: 8px;
    border: 1px solid transparent;
    transition: 0.3s;
}

.menu a.active{
border:1px solid #000;
background:#f5f5f5;
}

.menu a:hover {
    border: 1px solid #000;
}

.logout {
    text-decoration: none;
    text-align: center;
    padding: 10px;
    border: 1px solid #000;
    text-transform: uppercase;
    font-size: 13px;
    transition: 0.3s;
    color: #000;
}

.logout:hover {
    background: #000;
    color: #fff;
}

/* MAIN CONTENT */

.main{
flex:1;
padding:50px;
}

.header{
font-size:28px;
margin-bottom:20px;
letter-spacing:3px;
}

/* INSERT BUTTON */

.insert-btn{
margin-bottom:20px;
padding:10px 16px;
border:1px solid #000;
background:#fff;
cursor:pointer;
font-size:13px;
text-transform:uppercase;
}

.insert-btn:hover{
background:#000;
color:#fff;
}

/* TABLE CARD */

.card{
background:#fff;
border:1px solid #000;
box-shadow:10px 10px 0px #000;
padding:25px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th, td{
border-bottom:1px solid #000;
padding:14px;
text-align:left;
}

th{
font-size:14px;
letter-spacing:1px;
}

tr:hover{
background:#f7f7f7;
}

/* ACTION BUTTONS */

.actions{
display:flex;
gap:10px;
}

.update{
background:green;
color:#fff;
border:none;
padding:6px 12px;
cursor:pointer;
font-size:12px;
}

.delete{
background:red;
color:#fff;
border:none;
padding:6px 12px;
cursor:pointer;
font-size:12px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div>

<div class="logo">KAAMCHALUERP</div>

<div class="menu">
<a href="deshboard.html">DASHBOARD</a>
<a href="employees.html">EMPLOYEES</a>
<a href="inventory.html" class="active">INVENTORY</a>
<a href="reports.html">REPORTS</a>
</div>

</div>

<a href="logout" class="logout">LOGOUT</a>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<div class="header">INVENTORY</div>

<button class="insert-btn" onclick="location.href='itemInsert.html'">
INSERT ITEM
</button>

<div class="card">

<table>

<tr>
<th>ID</th>
<th>ITEM NAME</th>
<th>QUANTITY</th>
<th>PRICE</th>
<th>TOTAL</th>
<th>ACTIONS</th>
</tr>

<tr>
<td>1</td>
<td>Laptop</td>
<td>15</td>
<td>$800</td>
<td>$12000</td>
<td>
<div class="actions">
<button class="update">UPDATE</button>
<button class="delete">DELETE</button>
</div>
</td>
</tr>

<tr>
<td>2</td>
<td>Mouse</td>
<td>50</td>
<td>$20</td>
<td>$1000</td>
<td>
<div class="actions">
<button class="update">UPDATE</button>
<button class="delete">DELETE</button>
</div>
</td>
</tr>

</table>

</div>

</div>

</body>
</html>
