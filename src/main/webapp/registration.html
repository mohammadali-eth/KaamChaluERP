<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KaamChaluERP - Registration</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Courier New", monospace;
}

body {
    height: 100vh;
    color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #ffffff;
    background-image: 
        linear-gradient(to right, rgba(0,0,0,0.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,0.08) 1px, transparent 1px);

    background-size: 40px 40px;
}

.register-box {
    width: 420px;
    padding: 50px;
    border: 1px solid #000;
    box-shadow: 10px 10px 0px #000;
    background: #fff; 
}

.register-box h2 {
    text-transform: uppercase;
    margin-bottom: 40px;
    font-size: 22px;
    letter-spacing: 2px;
}

label {
    display: block;
    font-size: 12px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 25px;
    border: 1px solid #000;
    background: #fff;
    outline: none;
    font-family: inherit;
}

input:focus {
    background: #000;
    color: #fff;
}

button {
    width: 100%;
    padding: 12px;
    border: 1px solid #000;
    background: #fff;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #000;
    color: #fff;
}

.back {
    display: block;
    margin-top: 25px;
    text-decoration: none;
    color: #000;
    font-size: 12px;
    text-transform: uppercase;
}

.back:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="register-box">
    <h2>Create Access Node</h2>

    <form action="register" method="post">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Initialize Account</button>
    </form>

    <a href="index.html" class="back">← Return to Protocol</a>
</div>

</body>
</html>
